<body class="bg-light">

 <!-- Navbar start-->

          d="M0 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1z" />

      <span class="fs-4 text-white">CodeMaster</span> </a>


    <ul class="nav nav-pills">
      <li class="nav-item"><a href="index.html" class="nav-link" target="_blank">Home</a></li>

    </ul>
  </header>
</div>
<!--Navbar end-->


  <!-- Header start-->
  <section class="bg-secondary text-white text-center py-3">
    <h2 class="fw-bold">Admission Form</h2>
    <p>Fill the details to enroll in your desired course</p>
  </section>
  <!--header end-->

  <!-- Form Section -->
  <div class="container my-5" style="background-image: url(https://img.freepik.com/free-photo/top-view-desk-with-notepads-headphones_23-2148415076.jpg?semt=ais_hybrid&w=740&q=80
  );">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow border">
          <div class="card-body p-4" style="background-image: url(https://img.freepik.com/free-vector/paper-style-smooth-background_79603-1781.jpg?semt=ais_hybrid&w=740&q=80);">

            <h4 class="text-center mb-4 fw-bold">Apply Now</h4>

            <form>

              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" placeholder="Enter phone number" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Select Course</label>
                <select class="form-select">
                  <option>Science Coaching</option>
                  <option>Computer Classes</option>
                  <option>Competitive Exams</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="3" placeholder="Any query..."></textarea>
              </div>
              <!--form section end-->
              <!--button-->
              <button type="button" class="btn btn-success w-100">Submit Application</button>

            </form>

          </div>
        </div>

      </div>
    </div>
  </div>
   <section class="bg-secondary text-white text-center py-3">
    <h2 class="fw-bold">Contact Details</h2>
   
  </section>
   <!-- Contact Section -->
<section class="p-5">
  <div class="container">
    <div class="row g-4">

      <!-- Contact detail-->
      <div class="col-md-6">
        <h3>Contact us</h3>
        <form>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="Enter your name" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Enter your email" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-control" placeholder="Enter your phone number">
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="4" placeholder="Write your message"></textarea>
          </div>

          <button class="btn btn-primary w-100">Submit</button>
        </form>
      </div>

      <!-- Contact start -->
      <div class="col-md-6">
        <h3>Contact Info</h3>
        <p><strong>Address:</strong> Nagpur, Maharashtra</p>
        <p><strong>Phone:</strong> +91 98765 43210</p>
        <p><strong>Email:</strong> info@codemaster.com</p>

        <!-- Map -->
        <div class="mt-4">
          <iframe 
            src="https://maps.google.com/maps?q=Nagpur&t=&z=13&ie=UTF8&iwloc=&output=embed"
            width="100%" height="250" style="border:0;">
          </iframe>
        </div>
      </div>

    </div>
  </div>
</section>
<!--contact form end-->


  <!-- Footer -->
  <footer class="bg-dark text-white text-center p-3">
    <p class="mb-0">Learn more , Achieve more</p>
  </footer>
